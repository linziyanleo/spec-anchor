  - finding_id: F-4
    disposition: incorporated
    plan_change_summary: |-
      v2 §B1 cap/排序策略改为：visibility 是排序首键。具体规则：
        (1) 先按 visibility 分桶：immediate / sediment_queue / handoff（hidden 已过滤）；
        (2) immediate 桶 **uncapped**——必须全部入 bundle；
        (3) sediment_queue + handoff 共享 cap = MAX_FINDINGS（默认 50）；
        (4) 桶内排序：长前缀匹配 → impact desc → created desc。
      Bundle 输出顺序：immediate 段 → sediment_queue 段 → handoff 段。Verification V13
      重写为：构造 51 个匹配 finding，其中 1 个 visibility=immediate 且匹配前缀最短，
      跑 assemble，断言：(a) immediate finding 必出现；(b) 总 finding 数 = 1 + 50；
      (c) stdout warn 列出被截断的 1 条 handoff/sediment_queue finding。Open
      Questions Q4 标记为 resolved。

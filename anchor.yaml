specanchor:
  version: "0.5.0-beta.1"
  project_name: "spec-anchor"

  # === 运行模式 ===
  # spec-anchor 本身是一个 Skill 项目（Markdown + Shell 脚本混合），
  # 使用 full 模式管理自身的 Spec 体系
  mode: "full"

  # === 路径配置 ===
  paths:
    global_specs: ".specanchor/global/"
    module_specs: ".specanchor/modules/"
    task_specs: ".specanchor/tasks/"
    archive: ".specanchor/archive/"
    spec_index: ".specanchor/spec-index.md"
    module_index: ".specanchor/module-index.md"  # DEPRECATED: v0.5 删除；迁移期仅作 fallback
    project_codemap: ".specanchor/project-codemap.md"
    findings: ".specanchor/findings/"                       # v0.6 新增：hot context 写回入口
    sediment_proposals: ".specanchor/sediment/proposals/"   # v0.6 新增：hot→cold 安全回流

  # === 外部来源 ===
  # 公开仓库默认不声明 maintainer-local sources；
  # consumer 项目可按需在自己的 anchor.yaml 中追加 sources。

  # === 写作协议 ===
  writing_protocol:
    schema: "sdd-riper-one"
    schema_recommend: true

  coverage:
    scan_paths:
      - "SKILL.md"
      - "README.md"
      - "README_ZH.md"
      - "CONTRIBUTING.md"
      - "WHY.md"
      - "WHY_ZH.md"
      - "docs/INSTALL.md"
      - "FLOWCHART.md"
      - "scripts/**"
      - "references/**"
    ignore_paths:
      - "references/schemas/**/template.md"

  # === Hook 配置 ===
  hook:
    inline_budget_tokens: 600  # SessionStart hook 内联摘要的 token 预算 [200, 1500]

  # === Context 装配 ===
  assemble:
    full_load_max_lines: 220   # C3：full-load 行数硬上限——超过则即使预算允许（含 --budget=full）也降级 summary

  check:
    stale_days: 14
    outdated_days: 30
    warn_recent_commits_days: 14
    task_base_branch: "main"

  sync:
    auto_check_on_mr: true
    sprint_sync_reminder: false

  # === Harness Context Control 配置（v0.5.0-beta.1 引入） ===
  context_control:
    decision_log:
      hot_window: 5
      hot_types: [redirect, rollback, halt]
      respect_phase: true
    evidence_log:
      hot_window: 5
      hot_status: [failed, unverified-risk]
      auto_pin_acceptance: true
    enforce:
      hard_boundaries: error      # error | warning | off
      allowed_freedom: warning
      checkpoints_contract: warning
      evidence_ledger: warning
      handoff_packet: warning
    pre_commit:
      enabled: true
      blocking: true              # v0.5.0-beta.1 stable: lint failure aborts commit

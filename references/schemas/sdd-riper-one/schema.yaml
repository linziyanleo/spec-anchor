name: sdd-riper-one
version: 2
description: "SDD-RIPER-ONE 流程——带严格门禁的规范驱动开发。Research → (Innovate) → Plan → Execute → Review。v2 起声明 Harness Context Control 6 区段（见 context_control 节）。"

# strict = 有门禁（Plan Approved 才能进入 Execute）
# fluid = 无门禁（依赖是使能器不是门禁，随时可做任何事）
philosophy: strict

match:
  when:
    - "开发新功能、增强现有功能、实现产品需求"
    - "新增模块、组件、页面、API 端点"
    - "实现需求文档中描述的功能或用户故事"
    - "这是默认 Schema，当任务不明确属于哪个特定分类时使用"

artifacts:
  - id: research
    section: "## 2. Research Findings"
    description: "事实与约束调研——分析代码现状、依赖、风险"
    requires: []

  - id: innovate
    section: "## 3. Innovate"
    description: "多方案比较与决策——复杂任务建议 2-3 方案"
    requires: [research]
    optional: true
    skip_reason_required: true

  - id: plan
    section: "## 4. Plan (Contract)"
    description: "实现契约——文件变更清单 + 函数签名 + 原子 Checklist"
    requires: [research]
    gate:
      type: approval
      phrase: "Plan Approved"
      blocks: [execute]
      bypass_when_goal_active: true  # /goal hook active 时视为 auto-approved；CP §4.7 仍触发 stop。详见 references/integrations/goal-hook.md

  - id: execute
    section: "## 5. Execute Log"
    description: "按 Checklist 逐步实现"
    requires: [plan]

  - id: review
    section: "## 6. Review Verdict"
    description: "回顾校验——Spec 覆盖、行为检查、回归风险、Module Spec 是否需更新、Spec Sediment（经验沉淀回 Global/Module Spec）、§6.3 Capability Drift Check（spec 描述是否被后续代码超越，置于 §6.2 Evidence Ledger 后；详见 references/concepts/capability-drift.md）"
    requires: [execute]

apply:
  requires: [plan]
  tracks: "## 4.3 Implementation Checklist"

# Frontmatter 字段集 —— task spec frontmatter 协议事实声明
# validate.sh 按此校验 unknown / missing required；inject.sh 按此注入字段
frontmatter_fields:
  required:
    - level
    - task_name
    - author
    - created
    - status
  optional:
    - last_change
    - related_modules
    - related_global
    - branch
    - writing_protocol
    - assignee
    - reviewer
    - flow_type
    - updated
    - decision_log
    - evidence_log
    # legacy / 演进期可选字段（archive 中曾使用过的合法字段）
    - target_milestone
    - base_branch
    - scope
    - non_goals

# Frontmatter 字段类型 —— 仅声明 list / object 字段（string 默认）
field_types:
  related_modules: list
  related_global: list
  decision_log: object
  evidence_log: object
  non_goals: list

# Harness Context Control —— sdd-riper-one v2 起声明 6 个 Context 区段
# 仅声明协议事实（区段位置 / kind / writer），不放调参（hot_window 等调参在 anchor.yaml.context_control 与 task frontmatter）
context_control:
  - id: hard_boundaries
    section: "## 1.2 Hard Boundaries"
    kind: static
    writer: author
  - id: allowed_freedom
    section: "## 1.3 Allowed Freedom"
    kind: static
    writer: author
  - id: checkpoints_contract
    section: "### 4.7 Checkpoints — Contract"
    kind: static
    writer: author
  - id: decisions_log
    section: "## 5.2 Checkpoint Decisions Log"
    kind: dynamic
    writer: agent_or_human
  - id: evidence_ledger
    section: "## 6.2 Evidence Ledger"
    kind: dynamic
    writer: agent
  - id: handoff_packet
    section: "## 7.2 Handoff Packet"
    kind: auto-generated
    writer: tool

template: template.md
